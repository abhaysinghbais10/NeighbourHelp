<form id="form">
<input placeholder="Topic">
<input placeholder="Difficulty">
<input placeholder="Question">
<input placeholder="Option A">
<input placeholder="Option B">
<input placeholder="Option C">
<input placeholder="Option D">
<input placeholder="Correct (A/B/C/D)">
<button>Add</button>
</form>

<script>
document.getElementById("form").onsubmit=async function(e){
e.preventDefault();

await fetch("http://localhost:3001/add-question",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
topic:e.target[0].value,
difficulty:e.target[1].value,
question:e.target[2].value,
optionA:e.target[3].value,
optionB:e.target[4].value,
optionC:e.target[5].value,
optionD:e.target[6].value,
correct_ans:e.target[7].value
})
});

alert("Added");
}
</script>
